{% extends "base.html" %}
{% block title %}Login - AI Learning Platform{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-md-5">
    <div class="text-center mb-4">
      <div class="app-auth-brand" aria-label="AI learning platform">AI learning platform</div>
    </div>
    <div class="app-auth-card">
      <h1 class="app-auth-title">Log in</h1>
      <p class="app-auth-subtitle">Welcome back. Sign in to continue.</p>
      {% if error %}
      <div class="app-alert app-alert-danger mb-3" role="alert">{{ error }}</div>
      {% endif %}
      <form method="post" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label for="username" class="app-label">Username or email</label>
          <input type="text" class="form-control app-input" id="username" name="username" required autofocus placeholder="Username or email">
        </div>
        <div class="mb-4">
          <label for="password" class="app-label">Password</label>
          <input type="password" class="form-control app-input" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn app-btn-primary w-100 mb-2">Log in</button>
        {% if google_oauth %}
        <a href="{{ url_for('login_google') }}" class="btn app-btn-ghost w-100 mb-2 d-flex align-items-center justify-content-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign in with Google
        </a>
        {% endif %}
        <a href="{{ url_for('signup') }}" class="btn app-btn-ghost w-100">Sign up</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
