<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Reviews</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #fff; color: #000; }
    .title { font-size: 24px; font-weight: 700; margin: 16px 0; }
    .subtitle { color: #444; margin-bottom: 16px; }
    .table thead th { background: #f1f5f9; }
    @media print { .no-print { display: none; } }
  </style>
  <script>window.addEventListener('load', function(){ setTimeout(function(){ window.print(); }, 300); });</script>
  </head>
<body class="container py-4">
  <div class="no-print mb-3"><a href="javascript:window.print()" class="btn btn-primary btn-sm">Print</a></div>
  <div class="title">Reviews</div>
  <div class="table-responsive">
    <table class="table table-sm">
      <thead><tr><th>Path</th><th>Topic</th><th>Due date</th><th>Status</th></tr></thead>
      <tbody>
        {% for r in items %}
        <tr>
          <td>{{ r.path_name }}</td>
          <td>{{ r.topic }}</td>
          <td>{{ r.due_date }}</td>
          <td>{% if r.completed %}Done{% else %}Pending{% endif %}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
